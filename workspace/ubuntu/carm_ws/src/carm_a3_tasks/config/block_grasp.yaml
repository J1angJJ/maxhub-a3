workspace:
  base_frame_id: "base_link"
  table_z_m: 0.0

perception:
  detections_topic: "/carm_a3/perception/color_blocks"
  camera_info_topic: "/carm_a3/camera/camera_info"
  camera_frame_id: "carm_a3_camera_optical_frame"
  min_confidence: 0.45
  target_color: ""

block:
  size_m: [0.05, 0.05, 0.10]

grasp:
  tool_index: 0
  use_current_orientation: true
  align_to_block_axis: true
  align_only_when_descending: true
  align_tool_axis: "y"
  treat_gripper_axis_bidirectional: true
  auto_select_grasp_side: true
  max_gripper_open_m: 0.08
  grasp_clearance_m: 0.005
  align_yaw_offset_deg: 0.0
  keep_camera_view_during_approach: true
  view_transit_waypoints: 4
  target_quat_xyzw: [0.707, 0.0, 0.707, 0.0]
  use_tcp_target: true
  flange_to_tcp_xyz_m: [0.065338, 0.005939, 0.113513]
  tcp_grasp_z_m: 0.14
  approach_height_m: 0.08
  grasp_z_m: 0.22
  min_flange_z_m: 0.14
  lift_height_m: 0.10
  max_total_joint_delta_rad: 2.20
  max_segment_joint_delta_rad: 0.80
  segment_delta_rad: 0.08
  prefer_joint_trajectory: true
  fallback_after_trajectory_failure: false
  duration_s: 2.0
  wait: false
  open_before_approach: true
  open_gripper_pos_m: 0.065
  close_gripper_pos_m: 0.028
  gripper_tau_n: 5.0
  visual_recenter_after_approach: true
  tcp_frame_id: "gripper_tcp"
  recenter_iterations: 3
  recenter_tolerance_m: 0.006
  recenter_max_step_m: 0.04
  recenter_duration_s: 1.5
