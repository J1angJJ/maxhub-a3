workspace:
  base_frame_id: "base_link"
  table_region_m:
    x_min: 0.0
    x_max: 0.60
    y_min: -0.30
    y_max: 0.30
  table_z_m: 0.0

overview:
  # The base origin is assumed at the midpoint of the near edge of the 60x60 cm square.
  # First-pass target is above the table center. Orientation defaults to current flange orientation.
  target_xyz_m: [0.30, 0.0, 0.36]
  use_current_orientation: true
  target_quat_xyzw: [0.707, 0.0, 0.707, 0.0]
  tool_index: 0
  max_joint_delta_rad: 0.35
  segment_delta_rad: 0.10
  duration_s: 3.0
  wait: false

camera_check:
  color_blocks_topic: "/carm_a3/perception/color_blocks"
  debug_image_topic: "/carm_a3/perception/color_blocks/debug_image"
