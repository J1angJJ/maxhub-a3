workspace:
  base_frame_id: "base_link"
  table_region_m:
    x_min: 0.0
    x_max: 0.60
    y_min: -0.30
    y_max: 0.30
  table_z_m: 0.0

overview:
  # The base origin is assumed at the midpoint of the near edge of the 60x60 cm square.
  # First-pass target is above the table center. FOV mode computes the flange pose from camera intrinsics and hand-eye.
  target_xyz_m: [0.30, 0.0, 0.36]
  use_fov_solver: true
  use_current_orientation: false
  target_quat_xyzw: [0.707, 0.0, 0.707, 0.0]
  coverage_margin_m: 0.08
  min_camera_height_m: 0.25
  max_camera_height_m: 0.65
  search_reachable: true
  search_height_step_m: 0.05
  search_x_offsets_m: [0.0, -0.05, -0.10, -0.15, 0.05]
  search_y_offsets_m: [0.0, -0.05, 0.05]
  tool_index: 0
  max_total_joint_delta_rad: 2.20
  segment_delta_rad: 0.10
  duration_s: 3.0
  wait: false

camera_check:
  camera_info_yaml: "$(find carm_a3_vision)/config/camera_info.yaml"
  handeye_yaml: "$(find carm_a3_calibration)/config/handeye_flange_camera.yaml"
  color_blocks_topic: "/carm_a3/perception/color_blocks"
  debug_image_topic: "/carm_a3/perception/color_blocks/debug_image"

gripper:
  close_before_overview: true
  overview_pos_m: 0.005
  overview_tau_n: 5.0
